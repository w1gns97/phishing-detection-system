name: Train AI Model

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 가져오기
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 라이브러리 설치
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 모델 학습 실행
        run: python train_model.py

      - name: 모델 커밋 및 푸시
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add rf_model.pkl feature_names.pkl
          git commit -m "Auto-trained model"
          git push
